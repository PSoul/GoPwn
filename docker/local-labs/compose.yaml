name: llm-pentest-local-labs

services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: llm-pentest-juice-shop
    ports:
      - "3000:3000"
    restart: unless-stopped

  webgoat:
    image: webgoat/webgoat:latest
    container_name: llm-pentest-webgoat
    ports:
      - "18080:8080"
      - "19090:9090"
    restart: unless-stopped

  # DVWA - 经典 PHP 漏洞靶场 (SQL注入/XSS/命令注入/文件上传等)
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: llm-pentest-dvwa
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - dvwa-mysql

  # DVWA 后端 MySQL (root/root123 弱口令)
  dvwa-mysql:
    image: mysql:5.7
    container_name: llm-pentest-dvwa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: p@ssw0rd
    ports:
      - "13306:3306"
    restart: unless-stopped

  # 独立 MySQL 弱口令靶标 (root/123456)
  mysql-weak:
    image: mysql:5.7
    container_name: llm-pentest-mysql-weak
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: testdb
    ports:
      - "13307:3306"
    restart: unless-stopped

  # WordPress + 弱口令 CMS
  wordpress:
    image: wordpress:6.4-apache
    container_name: llm-pentest-wordpress
    ports:
      - "8082:80"
    environment:
      WORDPRESS_DB_HOST: wp-mysql:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress123
      WORDPRESS_DB_NAME: wordpress
    depends_on:
      - wp-mysql
    restart: unless-stopped

  wp-mysql:
    image: mysql:5.7
    container_name: llm-pentest-wp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress123
    restart: unless-stopped

  # phpMyAdmin (管理面板暴露面)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: llm-pentest-phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOSTS: dvwa-mysql,mysql-weak,wp-mysql
      PMA_USER: root
      PMA_PASSWORD: root123
    restart: unless-stopped

  # Redis 无认证 (未授权访问)
  redis-noauth:
    image: redis:7-alpine
    container_name: llm-pentest-redis-noauth
    ports:
      - "6379:6379"
    command: ["redis-server", "--protected-mode", "no"]
    restart: unless-stopped

  # SSH 弱口令 (root/root)
  ssh-weak:
    image: panubo/sshd:latest
    container_name: llm-pentest-ssh-weak
    ports:
      - "2222:22"
    environment:
      SSH_USERS: "root:0:0"
      ROOT_PASSWORD: "root"
    restart: unless-stopped

  # Tomcat 弱管理员 (tomcat/tomcat)
  tomcat-weak:
    build:
      context: ./tomcat
      dockerfile: Dockerfile
    container_name: llm-pentest-tomcat-weak
    ports:
      - "8888:8080"
    restart: unless-stopped

  # Elasticsearch 无认证 (集群信息泄露)
  elasticsearch-noauth:
    image: elasticsearch:7.17.18
    container_name: llm-pentest-elasticsearch-noauth
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    restart: unless-stopped

  # MongoDB 无认证 (未授权访问)
  mongodb-noauth:
    image: mongo:6
    container_name: llm-pentest-mongodb-noauth
    ports:
      - "27017:27017"
    command: ["mongod", "--bind_ip_all"]
    restart: unless-stopped
